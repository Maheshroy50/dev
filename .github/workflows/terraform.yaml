name: Terraform Actions
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    terraform:
        name: Terraform
        runs-on: ubuntu-latest
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION: us-east-1
        steps:
          - name: Checkout code
            uses: actions/checkout@v2

          
          - name: Set up Terraform
            uses: hashicorp/setup-terraform@v1
            with:
              terraform_version: 6.44.0

          - name: Terraform Init
            run: terraform init
        
          - name: Terraform Format
            run: terraform fmt -check
        
          - name: Terraform Validate
            run: terraform validate
        
          - name : Terraform Plan
            run: terraform plan -out=tfplan

          - name: Terraform Apply
            if: github.event_name == 'push'
            run: terraform apply -auto-approve tfplan

          - name: Trigger CodeDeploy deployment from S3 AppSpec
            if: github.event_name == 'push'
            run: |
              aws deploy create-deployment \
                --application-name "Blue-Green-Deployment" \
                --deployment-group-name "Blue-Green-Deployment" \
                --revision "revisionType=S3,s3Location={bucket=amzncodedeploy,key=appspec.yaml,bundleType=YAML}" \
                --description "Deployment triggered by GitHub Actions using S3 AppSpec"